name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (needed by Gradle/Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icon + splash screen from resources/
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor (copies www/ into the native Android project)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: skonga-ai-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
